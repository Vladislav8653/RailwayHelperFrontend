<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="./src/style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>mini-app</title>
  </head>
  <body>
    <div class="container">
      <form id="main-form" class="form-stack">
        <div class="form-group">
          <label for="station-departure">Станция отправления</label>
          <input type="text" id="station-departure" placeholder="Станция отправления">
        </div>

        <div class="form-group">
          <label for="station-arrival">Станция прибытия</label>
          <input type="text" id="station-arrival" placeholder="Станция прибытия">
        </div>

        <div class="form-group">
          <label for="date">Дата отправления</label>
          <input type="text" id="date" placeholder="Дата отправления">
        </div>

        <div class="form-group">
          <label for="train-number">Номер поезда</label>
          <input type="text" id="train-number" placeholder="Номер поезда">
        </div>

        <div class="form-group">
          <label for="carriage-number">Номер вагона</label>
          <input type="number" id="carriage-number" placeholder="Номер вагона">
        </div>

        <div class="form-group">
          <label for="carriage-type">Тип вагона</label>
          <input type="text" id="carriage-type" placeholder="Тип вагона">
        </div>

        <div class="form-group">
          <label for="place-number">Номер места</label>
          <input type="number" id="place-number" placeholder="Номер места">
        </div>
        
        <button type="submit" class="submit-btn">Проверить место</button>
      </form>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
